    function anyMarker( location, stopNumber )
	{
	return L.mapquest.textMarker( location.latLng,

	    draggable: false,
	    //text: location['street']+' ('+location['sideOfStreet']+')',
	    text:  STOPS[stopNumber].name,

		size:		'sm',
		shadow:		true,

		}
	    });
	}
